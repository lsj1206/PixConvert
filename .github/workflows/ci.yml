name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PixConvert.sln

      - name: Build
        run: dotnet build PixConvert.sln -c Release --no-restore -v minimal -m:1

      - name: Test
        run: dotnet test PixConvert.Tests\PixConvert.Tests.csproj -c Release --no-restore --no-build -v minimal
