name: Bug report
description: Report a reproducible problem in PixConvert.
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: version
    attributes:
      label: PixConvert version
      description: Use the version shown in the app or GitHub Release.
      placeholder: "v1.0.1"
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: "Windows 11 24H2"
    validations:
      required: true
  - type: input
    id: input-format
    attributes:
      label: Input format
      placeholder: "PNG, JPEG, WebP, AVIF, GIF"
    validations:
      required: true
  - type: input
    id: output-format
    attributes:
      label: Output format
      placeholder: "JPEG, PNG, BMP, WebP, AVIF, GIF"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open PixConvert.
        2. Add ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Attach logs, screenshots, or sample details if they can be shared safely.
    validations:
      required: false
